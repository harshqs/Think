<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800;900&display=swap');

  :root {
    --bg: #0a0c10;
    --card-bg: rgba(17, 25, 40, 0.75);
    --primary: #6366f1;
    --secondary: #06b6d4;
    --accent: #ec4899;
    --text-main: #f8fafc;
    --text-dim: #94a3b8;
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-glow: rgba(99, 102, 241, 0.15);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: var(--bg);
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Animated Mesh Background */
  .mesh-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: var(--bg);
  }

  .blob {
    position: absolute;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
    filter: blur(80px);
    opacity: 0.15;
    animation: move 20s infinite alternate;
  }

  .blob-2 {
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, var(--secondary) 0%, transparent 70%);
    left: 50%;
    top: 50%;
    opacity: 0.1;
    animation: move 25s infinite alternate-reverse;
  }

  .blob-3 {
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
    right: -100px;
    bottom: -100px;
    opacity: 0.08;
    animation: move 18s infinite alternate;
  }

  @keyframes move {
    0% {
      transform: translate(-10%, -10%) rotate(0deg);
    }

    100% {
      transform: translate(10%, 10%) rotate(360deg);
    }
  }

  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 1;
    pointer-events: none;
  }

  .wrapper {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 600px;
    padding: 40px 24px;
    text-align: center;
    animation: fadeIn 1s ease-out;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    padding: 8px 16px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    color: var(--secondary);
    margin-bottom: 32px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .badge-dot {
    width: 6px;
    height: 6px;
    background: var(--secondary);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--secondary);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {

    0%,
    100% {
      transform: scale(1);
      opacity: 1;
    }

    50% {
      transform: scale(1.5);
      opacity: 0.5;
    }
  }

  .logo-container {
    margin-bottom: 24px;
    display: inline-block;
    position: relative;
  }

  .logo-icon {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Outfit', sans-serif;
    font-weight: 900;
    font-size: 40px;
    color: white;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 20px rgba(99, 102, 241, 0.4);
    position: relative;
    z-index: 2;
  }

  .logo-glow {
    position: absolute;
    inset: -10px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    filter: blur(20px);
    opacity: 0.4;
    z-index: 1;
    border-radius: 30px;
  }

  h1 {
    font-family: 'Outfit', sans-serif;
    font-size: 64px;
    font-weight: 900;
    margin-bottom: 8px;
    background: linear-gradient(to bottom, #fff 40%, #94a3b8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
  }

  .version-tag {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    color: var(--text-dim);
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .main-card {
    background: var(--card-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    padding: 40px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    position: relative;
    overflow: hidden;
  }

  .main-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle at 50% 0%, var(--glass-glow), transparent 70%);
    pointer-events: none;
  }

  .platform-info {
    margin-bottom: 32px;
  }

  .platform-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 12px;
  }

  .file-details {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 40px;
  }

  .btn-download {
    width: 100%;
    background: var(--text-main);
    color: var(--bg);
    border: none;
    padding: 20px;
    border-radius: 18px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    overflow: hidden;
  }

  .btn-download:hover {
    transform: scale(1.02);
    background: #fff;
    box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
  }

  .btn-download:active {
    transform: scale(0.98);
  }

  .btn-icon {
    width: 20px;
    height: 20px;
    fill: currentColor;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-top: 40px;
    padding-top: 32px;
    border-top: 1px solid var(--glass-border);
  }

  .stat-item {
    text-align: center;
  }

  .stat-value {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--text-main);
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .progress-container {
    display: none;
    margin-top: 24px;
  }

  .progress-track {
    height: 6px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .progress-bar {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    transition: width 0.3s ease;
  }

  .progress-status {
    font-size: 13px;
    color: var(--secondary);
    font-weight: 600;
  }

  .success-msg {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #10b981;
    font-size: 14px;
    font-weight: 600;
    margin-top: 20px;
    animation: slideUp 0.5s ease;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(10px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .footer {
    margin-top: 48px;
    font-size: 12px;
    color: var(--text-dim);
    opacity: 0.5;
  }

  @media (max-width: 480px) {
    h1 {
      font-size: 48px;
    }

    .main-card {
      padding: 32px 24px;
    }

    .stats-grid {
      grid-template-columns: 1fr;
      gap: 16px;
    }
  }
</style>
<title>Think | Intelligent Desktop Experience</title>
</head>

<body>
  <div class="mesh-bg">
    <div class="blob"></div>
    <div class="blob-2"></div>
    <div class="blob-3"></div>
  </div>
  <div class="bg-grid"></div>

  <div class="wrapper">
    <div class="badge">
      <div class="badge-dot"></div> Now Live: v1.0.2
    </div>

    <div class="logo-container">
      <div class="logo-glow"></div>
      <div class="logo-icon">T</div>
    </div>

    <h1>THINK</h1>
    <div class="version-tag">Production Build 1.0.2</div>

    <div class="main-card">
      <div class="platform-info">
        <div class="platform-label">Recommended for your device</div>
        <div class="file-details">Think.Setup.1.0.2.exe &nbsp;•&nbsp; Windows 64-bit</div>
      </div>

      <button class="btn-download" id="dlBtn" onclick="startDownload()">
        <svg class="btn-icon" viewBox="0 0 24 24">
          <path
            d="M12 2a1 1 0 011 1v12.586l3.293-3.293a1 1 0 011.414 1.414l-5 5a1 1 0 01-1.414 0l-5-5a1 1 0 011.414-1.414L11 15.586V3a1 1 0 011-1zM4 20a1 1 0 011-1h14a1 1 0 110 2H5a1 1 0 01-1-1z" />
        </svg>
        <span>Download for Windows</span>
      </button>

      <div class="progress-container" id="progressBar">
        <div class="progress-track">
          <div class="progress-bar" id="progressFill"></div>
        </div>
        <div class="progress-status" id="progressStatus">Initializing...</div>
      </div>

      <div class="success-msg" id="successMsg">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12" />
        </svg>
        Download Securely Started
      </div>

      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value">v1.0.2</div>
          <div class="stat-label">Version</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">x64</div>
          <div class="stat-label">Arch</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">198 MB</div>
          <div class="stat-label">Size</div>
        </div>
      </div>
    </div>

    <p class="footer">&copy; 2026 Think Team &nbsp;•&nbsp; Built for Performance</p>
  </div>

  <script>
    const DOWNLOAD_URL = 'https://github.com/harshqs/Think/releases/download/v1.0.2/Think.Setup.1.0.2.exe';

    function startDownload() {
      const btn = document.getElementById('dlBtn');
      const container = document.getElementById('progressBar');
      const bar = document.getElementById('progressFill');
      const status = document.getElementById('progressStatus');
      const success = document.getElementById('successMsg');

      btn.style.display = 'none';
      container.style.display = 'block';

      // Artificial delay for better UX
      setTimeout(() => {
        window.location.href = DOWNLOAD_URL;

        let progress = 0;
        const interval = setInterval(() => {
          progress += Math.random() * 15;
          if (progress >= 100) {
            progress = 100;
            clearInterval(interval);

            bar.style.width = '100%';
            status.innerText = 'Completed';

            setTimeout(() => {
              container.style.display = 'none';
              success.style.display = 'flex';
            }, 600);
          } else {
            bar.style.width = progress + '%';
            status.innerText = `Downloading... ${Math.round(progress)}%`;
          }
        }, 120);
      }, 500);
    }
  </script>
</body>

</html>
