<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #010409;
    color: #e2e8f0;
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(99,179,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,179,237,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }

  .bg-glow-1 {
    position: fixed; width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
    top: -200px; left: -200px; pointer-events: none; z-index: 0;
  }

  .bg-glow-2 {
    position: fixed; width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(6,182,212,0.1) 0%, transparent 70%);
    bottom: -100px; right: -100px; pointer-events: none; z-index: 0;
  }

  .scan-line {
    position: fixed; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(99,102,241,0.5), rgba(6,182,212,0.5), transparent);
    animation: scan 4s ease-in-out infinite;
    pointer-events: none; z-index: 100;
  }

  @keyframes scan {
    0% { top: 0; opacity: 1; }
    100% { top: 100vh; opacity: 0; }
  }

  .wrapper {
    position: relative; z-index: 1;
    max-width: 860px; margin: 0 auto;
    padding: 80px 32px;
    text-align: center;
  }

  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(99,102,241,0.12);
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: 999px; padding: 6px 16px;
    font-size: 12px; font-weight: 500; color: #a5b4fc;
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 36px;
    animation: fadeDown 0.6s ease both;
  }

  .badge-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #6366f1; box-shadow: 0 0 8px #6366f1;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.8); }
  }

  .logo-icon {
    width: 72px; height: 72px; border-radius: 20px;
    background: linear-gradient(135deg, #6366f1, #06b6d4);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 30px; font-weight: 900; color: white;
    box-shadow: 0 0 40px rgba(99,102,241,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
    margin: 0 auto 28px;
    position: relative; overflow: hidden;
    animation: fadeDown 0.6s ease 0.1s both;
  }

  .logo-icon::after {
    content: '';
    position: absolute; top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.12) 50%, transparent 60%);
    animation: shimmer 3s ease infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%) translateY(-100%); }
    100% { transform: translateX(100%) translateY(100%); }
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(52px, 9vw, 90px);
    font-weight: 900; letter-spacing: -0.02em; line-height: 1;
    background: linear-gradient(135deg, #e2e8f0 0%, #a5b4fc 50%, #67e8f9 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
    animation: fadeDown 0.6s ease 0.2s both;
  }

  .version-tag {
    display: inline-block;
    background: rgba(6,182,212,0.1);
    border: 1px solid rgba(6,182,212,0.25);
    color: #67e8f9; border-radius: 999px;
    padding: 5px 14px; font-size: 13px; font-weight: 500;
    font-family: 'Orbitron', sans-serif; letter-spacing: 0.05em;
    margin-bottom: 56px;
    animation: fadeDown 0.6s ease 0.3s both;
    display: block;
  }

  .download-card {
    background: rgba(15,23,42,0.85);
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: 24px; padding: 48px;
    position: relative; overflow: hidden;
    animation: fadeUp 0.7s ease 0.4s both;
    backdrop-filter: blur(20px);
  }

  .download-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(99,102,241,0.7), rgba(6,182,212,0.7), transparent);
  }

  .platform-icon {
    width: 56px; height: 56px; margin: 0 auto 20px;
    background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
  }

  .platform-icon svg { width: 28px; height: 28px; fill: #a5b4fc; }

  .platform-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px; font-weight: 700; color: #a5b4fc;
    letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px;
  }

  .file-meta {
    font-size: 13px; color: #475569; margin-bottom: 36px;
  }

  .btn-download {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 12px;
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    color: white; border: none; border-radius: 14px;
    padding: 18px 48px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px; font-weight: 600; cursor: pointer;
    position: relative; overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 32px rgba(99,102,241,0.35), 0 4px 16px rgba(0,0,0,0.4);
    width: 100%; max-width: 380px;
    letter-spacing: 0.01em;
  }

  .btn-download::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
  }

  .btn-download:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 52px rgba(99,102,241,0.55), 0 8px 32px rgba(0,0,0,0.5);
  }

  .btn-download:active { transform: translateY(0); }

  .btn-download svg { width: 20px; height: 20px; fill: white; flex-shrink: 0; }

  .btn-label { display: block; font-size: 16px; font-weight: 600; }
  .btn-sub { display: block; font-size: 11px; opacity: 0.65; margin-top: 2px; font-weight: 400; }

  .divider {
    border: none; border-top: 1px solid rgba(255,255,255,0.05);
    margin: 36px 0 28px;
  }

  .meta-row {
    display: flex; justify-content: center; gap: 0;
    animation: fadeUp 0.7s ease 0.5s both;
  }

  .meta-item {
    flex: 1; padding: 0 20px; position: relative;
  }

  .meta-item + .meta-item::before {
    content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
    width: 1px; background: rgba(255,255,255,0.06);
  }

  .meta-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px; font-weight: 700; color: #e2e8f0; margin-bottom: 4px;
  }

  .meta-key {
    font-size: 11px; color: #475569;
    text-transform: uppercase; letter-spacing: 0.08em;
  }

  .progress-bar {
    display: none; height: 3px;
    background: rgba(255,255,255,0.06); border-radius: 999px;
    margin: 20px auto 0; overflow: hidden; max-width: 380px;
  }

  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #6366f1, #06b6d4);
    border-radius: 999px; transition: width 0.1s linear;
  }

  .success-msg {
    display: none; align-items: center; justify-content: center;
    gap: 8px; color: #4ade80; font-size: 14px; font-weight: 500;
    margin-top: 14px;
  }

  .footer {
    margin-top: 40px; font-size: 12px; color: #1e293b;
    animation: fadeUp 0.7s ease 0.6s both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="scan-line"></div>
<div class="bg-grid"></div>
<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>

<div class="wrapper">

  <div class="badge"><div class="badge-dot"></div>Now Available</div>

  <div class="logo-icon">T</div>

  <h1>THINK</h1>
  <span class="version-tag">Version 1.0.0</span>

  <div class="download-card">

    <div class="platform-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 3.449L9.75 2.1v9.451H0m10.949-9.602L24 0v11.4H10.949M0 12.6h9.75v9.451L0 20.699M10.949 12.6H24V24l-12.9-1.801"/>
      </svg>
    </div>

    <div class="platform-name">Windows</div>
    <div class="file-meta">think-setup-1.0.0.exe &nbsp;·&nbsp; 64-bit &nbsp;·&nbsp; Windows 10 / 11</div>

    <button class="btn-download" id="dlBtn" onclick="startDownload()">
      <svg viewBox="0 0 24 24"><path d="M12 2a1 1 0 011 1v12.586l3.293-3.293a1 1 0 011.414 1.414l-5 5a1 1 0 01-1.414 0l-5-5a1 1 0 011.414-1.414L11 15.586V3a1 1 0 011-1zM4 20a1 1 0 011-1h14a1 1 0 110 2H5a1 1 0 01-1-1z"/></svg>
      <div>
        <span class="btn-label">Download for Windows</span>
        <span class="btn-sub">think-setup-1.0.0.exe</span>
      </div>
    </button>

    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="success-msg" id="successMsg">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Download started — check your downloads folder
    </div>

    <hr class="divider">

    <div class="meta-row">
      <div class="meta-item">
        <div class="meta-val">1.0.0</div>
        <div class="meta-key">Version</div>
      </div>
      <div class="meta-item">
        <div class="meta-val">Windows</div>
        <div class="meta-key">Platform</div>
      </div>
      <div class="meta-item">
        <div class="meta-val">64-bit</div>
        <div class="meta-key">Architecture</div>
      </div>
    </div>

  </div>

  <p class="footer">Think · v1.0.0</p>

</div>

<script>
function startDownload() {
  const btn = document.getElementById('dlBtn');
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  const msg = document.getElementById('successMsg');
  btn.style.opacity = '0.5';
  btn.style.pointerEvents = 'none';
  bar.style.display = 'block';
  let w = 0;
  const iv = setInterval(() => {
    w += Math.random() * 14 + 5;
    if (w >= 100) {
      w = 100; clearInterval(iv);
      fill.style.width = '100%';
      setTimeout(() => {
        bar.style.display = 'none';
        msg.style.display = 'flex';
        btn.style.opacity = '1';
        btn.style.pointerEvents = 'auto';
      }, 400);
    }
    fill.style.width = w + '%';
  }, 90);
}
</script>

</body>
</html>
